        <h1>Calculo de Vida</h1>
        <h2>Indica la fecha de tu nacimiento</h2>
        <label for="Day">Dia</label>
        <input type="text" id="Day" name="Day"><br>
        <label for="Month">Mes</label>
        <input type="text" id="Month" name="Month"><br>
        <label for="Year">Año</label>
        <input type="text" id="Year" name="Year"><br>
        <h2>Indica la fecha actual</h2>
        <label for="ActualDay">Dia</label>
        <input type="text" id="ActualDay" name="ActualDay"><br>
        <label for="ActualMonth">Mes</label>
        <input type="text" id="ActualMonth" name="ActualMonth"><br>
